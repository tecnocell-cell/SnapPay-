version: '3.8'

services:
  # PostgreSQL — Banco de dados
  postgres:
    image: postgres:16-alpine
    container_name: snappay-postgres
    environment:
      POSTGRES_DB: snappay_homolog
      POSTGRES_USER: snappay_homolog_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-snappay_strong_password_change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U snappay_homolog_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - snappay-network
    restart: unless-stopped

  # Backend Node.js
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: snappay-backend
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: snappay_homolog
      DB_USER: snappay_homolog_user
      DB_PASSWORD: ${DB_PASSWORD:-snappay_strong_password_change_me}
      DB_DIALECT: postgres
      API_URL: ${API_URL:-https://homolog.seudominio.com.br}
      FRONTEND_URL: ${FRONTEND_URL:-https://homolog.seudominio.com.br}
      LOG_LEVEL: info
      LOG_DIR: /var/log/snappay
      FISCAL_PROVIDER: MOCK
      JWT_SECRET: ${JWT_SECRET:-your_jwt_secret_change_me}
      JWT_EXPIRES_IN: 7d
      CORS_ORIGIN: ${CORS_ORIGIN:-https://homolog.seudominio.com.br}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
      - snappay_logs:/var/log/snappay
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - snappay-network
    restart: unless-stopped
    command: sh -c "npm install && npx sequelize db:migrate && npm start"

  # Frontend React
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${API_URL:-https://homolog.seudominio.com.br}
    container_name: snappay-frontend
    networks:
      - snappay-network
    restart: unless-stopped

  # Nginx — Reverse Proxy + SSL
  nginx:
    image: nginx:alpine
    container_name: snappay-nginx
    depends_on:
      - backend
      - frontend
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/var/www/snappay-frontend:ro
      - snappay_logs:/var/log/snappay
      - ./certs:/etc/letsencrypt:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - snappay-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  snappay_logs:
    driver: local

networks:
  snappay-network:
    driver: bridge
